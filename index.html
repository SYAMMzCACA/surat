<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk CACA ❤️</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(180deg,#020617,#0f172a);
overflow:hidden;
color:white;
text-align:center;
}

/* bintang */
.star{
position:absolute;
width:2px;height:2px;background:white;
animation:twinkle 4s infinite;
}
@keyframes twinkle{0%{opacity:.2}50%{opacity:1}100%{opacity:.2}}

/* card */
.card{
backdrop-filter:blur(15px);
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
padding:40px;
border-radius:20px;
width:360px;
box-shadow:0 0 40px rgba(255,0,120,0.3);
}

/* foto */
.foto{
width:220px;height:260px;object-fit:cover;
border-radius:20px;margin:20px 0;
box-shadow:0 0 30px pink;
animation:zoom 6s infinite alternate;
}
@keyframes zoom{from{transform:scale(1)}to{transform:scale(1.08)}}

h1{font-size:28px;margin-bottom:10px}
h2{font-size:22px;margin-top:10px}

/* tombol */
button{
padding:12px 25px;
font-size:18px;
border:none;border-radius:12px;
margin:15px;cursor:pointer;
transition:.3s;
}
#yes{
background:linear-gradient(45deg,#ff0066,#ff4da6);
color:white;
box-shadow:0 0 20px pink;
}
#yes:hover{transform:scale(1.1)}
#no{background:white;position:absolute}

/* love jatuh */
.heart{
position:absolute;
font-size:28px;
animation:fall 6s linear infinite;
}
@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* ending */
#ending{
display:none;
font-size:40px;
color:pink;
text-shadow:0 0 20px pink;
}
</style>
</head>

<body>

<div class="card" id="card">

<h1>Untuk CACA ❤️</h1>

<img class="foto" src="https://i.imgur.com/ZKP0i2n.jpg">

<h2>Apakah kamu mau</h2>
<h2>menjadi calon istri aku? 💍</h2>

<button id="yes" onclick="yes()">Mau ❤️</button>
<button id="no" onmouseover="lari()">Tidak 😝</button>

</div>

<h1 id="ending">I LOVE YOU CACA ❤️</h1>

<!-- Musik romantis otomatis -->
<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2023/03/09/audio_0c9a4c7e2e.mp3" type="audio/mpeg">
</audio>

<script>

/* tombol tidak kabur */
function lari(){
let btn=document.getElementById("no")
let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight
btn.style.left=x+"px"
btn.style.top=y+"px"
}

/* kalau klik iya */
function yes(){
document.getElementById("card").style.display="none"
document.getElementById("ending").style.display="block"
confetti()
}

/* confetti */
function confetti(){
for(let i=0;i<120;i++){
let c=document.createElement("div")
c.innerHTML="🎉"
c.style.position="absolute"
c.style.left=Math.random()*100+"vw"
c.style.top="-20px"
c.style.fontSize="25px"
document.body.appendChild(c)
setTimeout(()=>{c.remove()},3000)
}
}

/* love jatuh */
let emoji=["❤️","💖","✨","🌸","💘"]
setInterval(function(){
let h=document.createElement("div")
h.className="heart"
h.innerHTML=emoji[Math.floor(Math.random()*emoji.length)]
h.style.left=Math.random()*100+"vw"
document.body.appendChild(h)
setTimeout(()=>{h.remove()},6000)
},400)

/* bintang */
for(let i=0;i<80;i++){
let star=document.createElement("div")
star.className="star"
star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"
document.body.appendChild(star)
}
</script>

</body>
</html>
