<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk CACA ❤️</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020617;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
overflow:hidden;
}

/* BOX */

.box{
background:rgba(0,0,0,0.8);
padding:35px;
border-radius:20px;
max-width:380px;
}

/* FOTO POLAROID */

.foto{
width:200px;
height:240px;
object-fit:cover;
border:10px solid white;
border-bottom:40px solid white;
border-radius:8px;
box-shadow:0 0 25px pink;
transform:rotate(-3deg);
margin:20px 0;
}

/* BUTTON */

button{
padding:12px 22px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin:6px;
}

.ya{
background:#22c55e;
color:white;
}

.tidak{
background:#ef4444;
color:white;
position:absolute;
}

/* STICKER */

.stiker{
position:absolute;
font-size:28px;
animation:jatuh 6s linear infinite;
}

@keyframes jatuh{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

/* LOVE OPENING */

.love{
font-size:80px;
animation:pulse 1.5s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.2)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<div class="box" id="awal">

<div class="love">❤️</div>

<h2>Hai CACA</h2>
<p>Aku ada sesuatu untuk kamu...</p>

<button onclick="mulai()">Buka</button>

</div>


<div class="box" id="chat" style="display:none">

<p id="text"></p>

<button onclick="lanjut()">Lanjut</button>

</div>


<div class="box" id="tanya" style="display:none">

<h2>Untuk CACA ❤️</h2>

<img class="foto" src="https://i.imgur.com/ZKP0i2n.jpg">

<h2>CACA...</h2>
<h2>Maukah kamu</h2>
<h2>menjadi calon istriku? 💍</h2>

<button class="ya" onclick="iya()">Mau ❤️</button>
<button class="tidak" id="tidak" onmouseover="lari()">Tidak 😝</button>

</div>


<div class="box" id="ending" style="display:none">

<h1>I LOVE YOU</h1>
<h1>CACA ❤️</h1>

</div>


<audio id="musik" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_8b8f8c88f5.mp3">
</audio>


<script>

let cerita=[
"Hai CACA...",
"Aku ingin mengatakan sesuatu...",
"Kamu adalah orang yang sangat berarti dalam hidupku.",
"Setiap hari bersamamu membuat hidupku lebih bahagia.",
"Aku ingin masa depan bersamamu.",
"Jadi aku ingin menanyakan satu hal penting..."
]

let index=0

function mulai(){

document.getElementById("awal").style.display="none"
document.getElementById("chat").style.display="block"

document.getElementById("musik").play()

tulis()

}

function tulis(){

let text=cerita[index]

let i=0

document.getElementById("text").innerHTML=""

let interval=setInterval(function(){

if(i<text.length){

document.getElementById("text").innerHTML+=text.charAt(i)
i++

}else{

clearInterval(interval)

}

},40)

}

function lanjut(){

index++

if(index<cerita.length){

tulis()

}else{

document.getElementById("chat").style.display="none"
document.getElementById("tanya").style.display="block"

}

}

function iya(){

document.getElementById("tanya").style.display="none"
document.getElementById("ending").style.display="block"

}

function lari(){

let btn=document.getElementById("tidak")

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

btn.style.left=x+"px"
btn.style.top=y+"px"

}

/* STICKER LUCU */

let emoji=["❤️","🥰","💌","🌸","✨"]

setInterval(function(){

let s=document.createElement("div")

s.className="stiker"

s.innerHTML=emoji[Math.floor(Math.random()*emoji.length)]

s.style.left=Math.random()*100+"vw"

document.body.appendChild(s)

setTimeout(()=>{s.remove()},6000)

},500)

</script>

</body>
  </html>
