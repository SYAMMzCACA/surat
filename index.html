<!DOCTYPE html>
<html>
<head>
<title>Untuk CACA ❤️</title>

<style>
body{
background:#ffc0cb;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:60px;
color:#fff;
font-size:35px;
text-shadow:2px 2px 5px black;
}

img{
width:200px;
border-radius:20px;
margin-top:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:10px;
margin:20px;
cursor:pointer;
}

#yes{
background:#ff4d6d;
color:white;
}

#no{
background:white;
position:absolute;
}

.stiker{
position:absolute;
font-size:30px;
animation:jatuh 6s linear infinite;
}

@keyframes jatuh{
0%{transform:translateY(-100px)}
100%{transform:translateY(100vh)}
}
</style>

</head>
<body>

<h1>CACA ❤️</h1>

<h1>Apakah kamu mau menjadi calon istri aku? 💍</h1>

<img src="https://i.imgur.com/ZKP0i2n.jpg">

<br>

<button id="yes" onclick="iya()">IYA ❤️</button>
<button id="no" onmouseover="lari()">TIDAK</button>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script>

function iya(){
alert("Yeay ❤️ sekarang kamu calon istriku 😆")
}

function lari(){
let btn=document.getElementById("no")

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

btn.style.left=x+"px"
btn.style.top=y+"px"
}

let emoji=["❤️","💖","✨","🌸","💘"]

setInterval(function(){

let s=document.createElement("div")

s.className="stiker"
s.innerHTML=emoji[Math.floor(Math.random()*emoji.length)]

s.style.left=Math.random()*100+"vw"

document.body.appendChild(s)

setTimeout(()=>{s.remove()},6000)

},500)

</script>

</body>
</html>
