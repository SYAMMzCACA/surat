<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk CACA ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(#020617,#0f172a);
overflow:hidden;
color:white;
text-align:center;
}

/* card */

.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(10px);
padding:40px;
border-radius:20px;
width:360px;
box-shadow:0 0 40px rgba(255,0,120,0.4);
}

/* foto */

.foto{
width:220px;
height:260px;
object-fit:cover;
border-radius:20px;
margin:20px 0;
box-shadow:0 0 25px pink;
}

/* button */

button{
padding:12px 25px;
font-size:18px;
border:none;
border-radius:10px;
margin:10px;
cursor:pointer;
}

#yes{
background:#ff2d75;
color:white;
}

#no{
background:white;
position:absolute;
}

/* heart */

.heart{
position:absolute;
font-size:28px;
animation:fall 6s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-100px)}
100%{transform:translateY(110vh)}
}

/* ending */

#ending{
display:none;
font-size:40px;
color:pink;
text-shadow:0 0 20px pink;
}

</style>
</head>

<body>

<!-- halaman awal -->

<div class="card" id="start">

<h2>Hai CACA ❤️</h2>
<h3>Aku ada sesuatu yang ingin aku tanyakan...</h3>

<br>

<button onclick="mulai()">Buka</button>

</div>


<!-- halaman utama -->

<div class="card" id="main" style="display:none">

<h2>CACA ❤️</h2>

<img class="foto" src="https://i.imgur.com/ZKP0i2n.jpg">

<h2>Apakah kamu mau</h2>
<h2>menjadi calon istri aku? 💍</h2>

<button id="yes" onclick="yes()">Mau ❤️</button>
<button id="no" onmouseover="lari()">Tidak 😝</button>

</div>


<h1 id="ending">I LOVE YOU CACA ❤️</h1>


<!-- musik romantis -->

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>


<script>

/* buka halaman */

function mulai(){

document.getElementById("start").style.display="none"
document.getElementById("main").style.display="block"

}

/* tombol tidak kabur */

function lari(){

let btn=document.getElementById("no")

let x=Math.random()*window.innerWidth
let y=Math.random()*window.innerHeight

btn.style.left=x+"px"
btn.style.top=y+"px"

}

/* klik iya */

function yes(){

document.getElementById("main").style.display="none"
document.getElementById("ending").style.display="block"

confetti()

}

/* confetti */

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div")

c.innerHTML="🎉"

c.style.position="absolute"
c.style.left=Math.random()*100+"vw"
c.style.top="-20px"
c.style.fontSize="25px"

document.body.appendChild(c)

setTimeout(()=>{c.remove()},3000)

}

}

/* love jatuh */

let emoji=["❤️","💖","✨","🌸"]

setInterval(function(){

let h=document.createElement("div")

h.className="heart"

h.innerHTML=emoji[Math.floor(Math.random()*emoji.length)]

h.style.left=Math.random()*100+"vw"

document.body.appendChild(h)

setTimeout(()=>{h.remove()},6000)

},500)

</script>

</body>
</html>
